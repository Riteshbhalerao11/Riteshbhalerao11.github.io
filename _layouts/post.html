---
layout: default
---
<div class="post">

<div class="post-header-container">
  <div class="scrim">
    <header class="post-header">
      <h1 class="title">{{ page.title }}</h1>
      <p class="info">by <strong>{{ page.author }}</strong></p>
    </header>
  </div>
</div>

<div class="wrapper">

<section class="post-meta">
  <div class="post-date">{{ page.date | date: "%B %-d, %Y" }}</div>
  <div class="post-categories">
  {% if page.categories.size > 0 %}in {% for cat in page.categories %}
    <a href="{{ site.baseurl }}/writing/">{{ cat | capitalize }}</a>{% if forloop.last == false %}, {% endif %}
  {% endfor %}{% endif %}
  </div>
</section>

<article class="post-content">
  {{ content }}
</article>

</div>
</div>
