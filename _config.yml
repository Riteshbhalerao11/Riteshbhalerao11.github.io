# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-paginate-v2

exclude:
  - "/vendor/"
  - "Gemfile"
  - "Gemfile.lock"
  - "README.md"
  - "LICENSE.md"

# Site settings
title: "Ritesh's Blog"
subtitle: "Thoughts, Projects & More"
email: ritesh.bhalerao.11603@gmail.com
name: Ritesh Bhalerao
description: >
  Personal blog and portfolio of Ritesh Bhalerao.
baseurl: ""
url: "https://riteshbhalerao11.github.io"
cover: ""
logo: ""

# Build settings
markdown: kramdown
inter_post_navigation: false
highlightjs_theme: "monokai-sublime"

# Pagination Settings
pagination:
  enabled: true
  per_page: 5
  permalink: "/page/:num/"
  sort_reverse: true

# Google analytics
# ga_tracking_id: "UA-XXXX-1"

# Category descriptions (for archive pages)
descriptions:
  - cat: tech
    desc: "Posts about technology and programming."

  - cat: life
    desc: "Personal thoughts and experiences."

# Social icons and sharing options
social:
  - name: GitHub
    icon: github
    username: Riteshbhalerao11
    url: https://github.com/Riteshbhalerao11
    desc: Check out my GitHub
    share: false

  - name: LinkedIn
    icon: linkedin
    username: Ritesh Bhalerao
    url: https://www.linkedin.com/in/ritesh-bhalerao
    desc: Connect with me on LinkedIn
    share: true

# Social sharing protocols
protocols:
    fb_image: "/assets/logo.png"
    fb_image_width: 612
    fb_image_height: 605
    fb_image_type: "image/png"

    twitter_image: "/assets/logo.png"

    os_repo: "https://github.com/Riteshbhalerao11/Riteshbhalerao11.github.io"
    os_rcs_type: "git"
    os_src: "git@github.com:Riteshbhalerao11/Riteshbhalerao11.github.io.git"
